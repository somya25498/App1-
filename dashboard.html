<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirSense | Unified Control Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .tab-active { border-bottom: 3px solid #0369a1; color: #0369a1; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- HEADER -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="text-white text-center md:text-left">
                <h1 class="text-4xl font-black tracking-tighter text-slate-900">AirSense.</h1>
                <p class="text-xs font-bold uppercase tracking-[0.3em] text-slate-700 opacity-80 mt-1">Delhi NCR Intelligence Hub</p>
            </div>
            
            <nav class="glass rounded-2xl flex p-1">
                <button onclick="switchTab('rankings')" id="btn-rankings" class="px-6 py-2 text-sm font-bold transition-all tab-active">Localities</button>
                <button onclick="switchTab('industrial')" id="btn-industrial" class="px-6 py-2 text-sm font-bold transition-all">Industrial</button>
                <button onclick="switchTab('complaints')" id="btn-complaints" class="px-6 py-2 text-sm font-bold transition-all">Complaints</button>
            </nav>

            <div class="flex items-center gap-2">
                <button id="adminToggle" onclick="toggleAdmin()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-xl">
                    Admin: OFF
                </button>
            </div>
        </header>

        <!-- TAB 1: LOCALITY RANKINGS -->
        <section id="tab-rankings" class="space-y-6">
            <div class="grid grid-cols-1 gap-4" id="rank-list">
                <!-- Injected via JS -->
            </div>
        </section>

        <!-- TAB 2: INDUSTRIAL SITES -->
        <section id="tab-industrial" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Injected via JS -->
        </section>

        <!-- TAB 3: COMPLAINTS & ADMIN -->
        <section id="tab-complaints" class="hidden space-y-6">
            <div class="bg-white/40 border border-white/20 p-6 rounded-3xl text-center mb-8">
                <h2 class="text-xl font-black text-slate-800">📢 Citizen Voice Tracker</h2>
                <p class="text-sm text-slate-600 font-medium">Monitoring public reports and authority response status.</p>
            </div>
            <div id="complaints-list" class="space-y-4">
                <!-- Injected via JS -->
            </div>
        </section>
    </div>

    <script>
        /**
         * CONFIGURATION
         */
        const BACKEND_URL = "http://localhost:5000"; 
        let isAdminMode = false;

        const localities = ["Hauz Khas", "Dwarka", "Connaught Place", "Rohini", "Janakpuri", "Anand Vihar", "Okhla"];
        const industrialSites = [
            { id: "OKH-92", name: "Okhla Industrial Estate", sector: "Manufacturing" },
            { id: "BAW-05", name: "Bawana Cluster", sector: "Chemical" },
            { id: "MAY-12", name: "Mayapuri Phase II", sector: "Metal Recycling" }
        ];

        const getFakeAqi = () => Math.floor(Math.random() * 250) + 40;

        function switchTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`btn-${tab}`).classList.add('tab-active');

            if(tab === 'rankings') renderRankings();
            if(tab === 'industrial') renderIndustrial();
            if(tab === 'complaints') renderComplaints();
        }

        function toggleAdmin() {
            isAdminMode = !isAdminMode;
            const btn = document.getElementById('adminToggle');
            btn.innerText = isAdminMode ? "Admin: ON" : "Admin: OFF";
            btn.className = isAdminMode ? "bg-red-600 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg" : "bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest";
            renderComplaints();
        }

        function renderRankings() {
            const list = document.getElementById('rank-list');
            const data = localities.map(l => ({ name: l, aqi: getFakeAqi() })).sort((a,b) => a.aqi - b.aqi);
            
            list.innerHTML = data.map((item, i) => `
                <div class="glass p-6 rounded-2xl flex items-center justify-between shadow-sm transition-all hover:scale-[1.01]">
                    <div class="flex items-center gap-6">
                        <span class="text-2xl font-black text-blue-300">#${i+1}</span>
                        <div>
                            <h3 class="text-xl font-bold text-slate-800">${item.name}</h3>
                            <p class="text-[10px] font-bold ${item.aqi < 100 ? 'text-green-600' : 'text-red-500'} uppercase tracking-widest">
                                ${item.aqi < 100 ? '✓ Optimized Air Quality' : '⚠ High Emission Alert'}
                            </p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="text-3xl font-black text-slate-900">${item.aqi}</span>
                        <p class="text-[8px] font-bold text-slate-400 uppercase">AQI Index</p>
                    </div>
                </div>
            `).join('');
        }

        function renderIndustrial() {
            const grid = document.getElementById('tab-industrial');
            grid.innerHTML = industrialSites.map(site => {
                const pm = getFakeAqi();
                return `
                <div class="glass p-8 rounded-[2rem] shadow-xl relative overflow-hidden">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">${site.id}</span>
                            <h2 class="text-2xl font-bold text-slate-800">${site.name}</h2>
                            <p class="text-slate-500 text-sm">${site.sector} Sector</p>
                        </div>
                        <div class="w-3 h-3 bg-red-500 rounded-full status-pulse"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/50 p-4 rounded-2xl">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">PM2.5</p>
                            <p class="text-2xl font-black text-slate-800">${pm}</p>
                        </div>
                        <div class="bg-white/50 p-4 rounded-2xl">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">CO2</p>
                            <p class="text-2xl font-black text-slate-800">${Math.floor(pm * 2.4)}</p>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        /**
         * COMPLAINT REMOVER LOGIC
         */
        async function deleteComplaint(id) {
            if(!confirm("Are you sure you want to permanently remove this complaint?")) return;

            console.log(`Requesting deletion for ID: ${id}`);
            
            /* BACKEND INTEGRATION CODE:
            try {
                await fetch(`${BACKEND_URL}/api/complaints/${id}`, { method: 'DELETE' });
                renderComplaints();
            } catch (e) { alert("Backend deletion failed"); }
            */

            // Local Fallback
            let complaints = JSON.parse(localStorage.getItem('complaints') || '[]');
            complaints = complaints.filter(c => c.id != id);
            localStorage.setItem('complaints', JSON.stringify(complaints));
            renderComplaints();
        }

        async function updateComplaintStatus(id, newStatus) {
            let complaints = JSON.parse(localStorage.getItem('complaints') || '[]');
            complaints = complaints.map(c => c.id == id ? {...c, status: newStatus} : c);
            localStorage.setItem('complaints', JSON.stringify(complaints));
            renderComplaints();
        }

        function renderComplaints() {
            const list = document.getElementById('complaints-list');
            const data = JSON.parse(localStorage.getItem('complaints') || '[]');
            
            if(data.length === 0) {
                list.innerHTML = `<div class="glass p-20 rounded-3xl text-center text-slate-400 font-bold">No active citizen reports found.</div>`;
                return;
            }

            list.innerHTML = data.map(c => `
                <div class="glass p-6 rounded-2xl border-l-8 ${c.status === 'Pending' ? 'border-amber-400' : 'border-emerald-500'} transition-all hover:bg-white/95">
                    <div class="flex flex-col md:flex-row justify-between gap-4">
                        <div class="space-y-1 flex-grow">
                            <div class="flex items-center gap-3">
                                <h4 class="text-xl font-bold text-slate-800">${c.locality}</h4>
                                <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-slate-200 text-slate-600 uppercase">${c.status}</span>
                            </div>
                            <p class="text-slate-500 text-sm italic">"${c.description}"</p>
                            <div class="flex gap-4 pt-2">
                                <span class="text-[10px] font-black text-blue-400 uppercase">AQI: ${c.aqi}</span>
                                <span class="text-[10px] font-black text-slate-400 uppercase">SEVERITY: ${c.severity}</span>
                            </div>
                        </div>
                        
                        <div class="flex flex-col gap-2 min-w-[180px]">
                            ${isAdminMode ? `
                                ${c.status === 'Pending' ? `
                                    <button onclick="updateComplaintStatus(${c.id}, 'Resolved')" class="bg-emerald-500 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-md hover:bg-emerald-600 transition-all uppercase">
                                        Mark Resolved
                                    </button>
                                ` : `
                                    <button onclick="updateComplaintStatus(${c.id}, 'Pending')" class="bg-amber-500 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-md hover:bg-amber-600 transition-all uppercase">
                                        Re-open Case
                                    </button>
                                `}
                                <button onclick="deleteComplaint(${c.id})" class="bg-white border-2 border-red-500 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black hover:bg-red-500 hover:text-white transition-all uppercase">
                                    Remove Report
                                </button>
                            ` : `
                                <span class="text-[10px] font-bold text-slate-400 text-right uppercase">Authority Action Pending</span>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = () => renderRankings();
    </script>
</body>
</html>
