<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public Complaints Tracker | AirSense</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
}
</style>
</head>

<body class="min-h-screen p-6">

<h1 class="text-4xl font-black text-white text-center mb-10">
📢 Public Air Quality Complaints
</h1>

<p class="text-center text-slate-300 max-w-2xl mx-auto mb-10">
This page shows air pollution complaints filed by citizens,
grouped by locality, along with the current action status.
</p>

<div id="complaintsContainer" class="space-y-8 max-w-4xl mx-auto"></div>

<script>
const container = document.getElementById("complaintsContainer");
const complaints = JSON.parse(localStorage.getItem("complaints") || "[]");

// Group complaints by locality
const grouped = complaints.reduce((acc, c) => {
    acc[c.locality] = acc[c.locality] || [];
    acc[c.locality].push(c);
    return acc;
}, {});

if (!complaints.length) {
    container.innerHTML = `
        <p class="text-slate-300 text-center">
            No complaints have been reported yet.
        </p>`;
}

// Render locality-wise complaints
for (const locality in grouped) {
    const block = document.createElement("div");
    block.className = "bg-white/95 backdrop-blur-xl rounded-3xl shadow-2xl p-6";

    block.innerHTML = `
        <h2 class="text-2xl font-black mb-4">📍 ${locality}</h2>

        ${grouped[locality].map(c => `
            <div class="border rounded-xl p-4 mb-4">
                <p class="text-sm"><b>AQI:</b> ${c.aqi}</p>
                <p class="text-sm"><b>Severity:</b> ${c.severity}</p>
                <p class="text-sm mb-3"><b>Issue:</b> ${c.description}</p>

                <span class="inline-block text-xs font-bold px-3 py-1 rounded-full
                    ${c.status === "Pending"
                        ? "bg-yellow-100 text-yellow-700"
                        : "bg-green-100 text-green-700"}">
                    ${c.status}
                </span>
            </div>
        `).join("")}
    `;

    container.appendChild(block);
}
</script>

</body>
</html>
