<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirSense | Industrial Monitoring</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #60a5fa 0%, #22d3ee 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .status-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>

<body class="p-4 md:p-10">

<div class="max-w-6xl mx-auto">

    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
        <div class="text-white">
            <h1 class="text-4xl font-black tracking-tight">Industrial Site Monitoring</h1>
            <p class="text-blue-100 font-medium opacity-90 uppercase text-xs tracking-[0.2em] mt-1">
                Point Source Emissions • Live Diagnostic
            </p>
        </div>

        <div class="bg-white/20 border border-white/30 px-4 py-2 rounded-xl flex items-center gap-3">
            <div class="w-3 h-3 bg-green-400 rounded-full status-pulse"></div>
            <span class="text-white text-sm font-bold">VIRTUAL SENSORS ACTIVE</span>
        </div>
    </div>

    <!-- Dashboard Grid -->
    <div id="industrial-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>

    <!-- Complaint Buttons -->
    <div class="mt-10 flex justify-center gap-6">
        <a href="complaint.html">
            <button
                class="bg-white text-slate-800 font-bold px-8 py-4 rounded-2xl shadow-xl
                       hover:bg-slate-100 hover:scale-105 transition-all duration-200">
                📝 Add Complaint to Administrator
            </button>
        </a>

        <a href="complaint_public.html">
            <button
                class="bg-white text-slate-800 font-bold px-8 py-4 rounded-2xl shadow-xl
                       hover:bg-slate-100 hover:scale-105 transition-all duration-200">
                📝 View Complaints And Their Status
            </button>
        </a>
    </div>

    <!-- Footer -->
    <footer class="mt-12 text-center text-white/70 text-xs">
        <p>
            Note: Data currently being served via simulated nodes.
            Hardware restoration pending for Okhla / Anand Vihar sectors.
        </p>
    </footer>

</div>

<!-- Script -->
<script>
    const sites = [
        { id: "OKH-01", name: "Okhla Industrial Estate", type: "Manufacturing Hub" },
        { id: "AV-09", name: "Anand Vihar ISBT Sector", type: "Transport & Logistics" },
        { id: "BAW-04", name: "Bawana Industrial Area", type: "Chemical & Plastic" },
        { id: "MAY-02", name: "Mayapuri Phase II", type: "Metal & Scrapping" }
    ];

    function generateData() {
        return {
            pm25: Math.floor(Math.random() * (350 - 150) + 150),
            co2: Math.floor(Math.random() * (1200 - 600) + 600),
            nh3: (Math.random() * (45 - 10) + 10).toFixed(1)
        };
    }

    function getCompliance(pm) {
        if (pm > 250) {
            return { label: "CRITICAL VIOLATION", color: "text-red-600", bg: "bg-red-100" };
        }
        return { label: "UNDER REVIEW", color: "text-orange-600", bg: "bg-orange-100" };
    }

    function updateDashboard() {
        const grid = document.getElementById("industrial-grid");

        grid.innerHTML = sites.map(site => {
            const data = generateData();
            const status = getCompliance(data.pm25);
            const loadPercent = Math.floor((data.pm25 / 400) * 100);

            return `
                <div class="glass-panel rounded-3xl p-6 shadow-xl transition-all hover:-translate-y-1">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">${site.id}</span>
                            <h2 class="text-2xl font-bold text-slate-800">${site.name}</h2>
                            <p class="text-slate-500 text-sm">${site.type}</p>
                        </div>
                        <span class="${status.bg} ${status.color} text-[10px] font-black px-3 py-1 rounded-full">
                            ${status.label}
                        </span>
                    </div>

                    <div class="grid grid-cols-3 gap-4">
                        <div class="bg-white/50 p-4 rounded-2xl">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">PM2.5</p>
                            <p class="text-2xl font-black text-slate-800">${data.pm25}</p>
                            <p class="text-[8px] text-slate-400">µg/m³</p>
                        </div>

                        <div class="bg-white/50 p-4 rounded-2xl">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">CO₂</p>
                            <p class="text-2xl font-black text-slate-800">${data.co2}</p>
                            <p class="text-[8px] text-slate-400">PPM</p>
                        </div>

                        <div class="bg-white/50 p-4 rounded-2xl">
                            <p class="text-[10px] font-bold text-slate-400 uppercase">NH₃</p>
                            <p class="text-2xl font-black text-slate-800">${data.nh3}</p>
                            <p class="text-[8px] text-slate-400">PPM</p>
                        </div>
                    </div>

                    <div class="mt-6">
                        <div class="flex justify-between text-[10px] font-bold mb-2">
                            <span class="text-slate-500 uppercase">Load Capacity</span>
                            <span class="text-blue-600">${loadPercent}%</span>
                        </div>
                        <div class="w-full bg-slate-200 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-blue-500 h-full" style="width:${loadPercent}%"></div>
                        </div>
                    </div>
                </div>
            `;
        }).join("");
    }

    updateDashboard();
    setInterval(updateDashboard, 3000);
</script>

</body>
</html>
