<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirSense | Locality Rankings</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #60a5fa 0%, #22d3ee 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="p-4 md:p-8 flex items-center justify-center">

<div id="app" class="w-full max-w-2xl">

    <!-- Loading Screen -->
    <div id="loader" class="text-center text-white py-20">
        <h1 class="text-4xl font-extrabold mb-4">AirSense</h1>
        <p class="text-xl opacity-90 font-light" id="loading-text">
            Collecting data for Connaught Place
        </p>
        <div class="mt-8 flex justify-center">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-white border-t-transparent"></div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="content" class="hidden space-y-6">

        <div class="text-center text-white mb-10">
            <h1 class="text-4xl font-extrabold mb-2 tracking-tight">
                Rank of My Locality
            </h1>
            <p class="text-sm opacity-80 uppercase tracking-widest font-semibold">
                Delhi NCR Hyper-local Monitoring
            </p>
        </div>

        <div class="glass-card rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-slate-100 bg-white/50 flex justify-between items-center">
                <span class="font-bold text-slate-800">Ranked by Air Quality</span>
                <span class="text-xs bg-blue-100 text-blue-600 px-3 py-1 rounded-full font-bold uppercase">
                    Live
                </span>
            </div>

            <div id="rank-list" class="divide-y divide-slate-100">
                <!-- Rankings injected here -->
            </div>
        </div>

        <!-- Buttons Section -->
        <div class="text-center flex flex-col gap-4 items-center">
            <button onclick="location.reload()"
                class="bg-white/20 hover:bg-white/30 text-white px-6 py-2 rounded-full
                       text-sm font-semibold transition-all border border-white/30">
                Refresh Localities
            </button>

            <button onclick="window.location.href='indutrial.html'"
                class="bg-white/20 hover:bg-white/30 text-white px-6 py-2 rounded-full
                       text-sm font-semibold transition-all border border-white/30">
                View Industries Data
            </button>
        </div>

    </div>
</div>

<script>
    const localities = [
        "Connaught Place", "Dwarka", "Okhla", "Rohini",
        "Hauz Khas", "Janakpuri", "Anand Vihar"
    ];

    const loader = document.getElementById("loader");
    const content = document.getElementById("content");
    const loadingText = document.getElementById("loading-text");
    const rankList = document.getElementById("rank-list");

    function getStatus(aqi) {
        if (aqi <= 50) return { label: "Safe", color: "bg-green-500", text: "text-green-600", msg: "Air quality is safe" };
        if (aqi <= 100) return { label: "Moderate", color: "bg-yellow-500", text: "text-yellow-600", msg: "Sensitive groups should take caution" };
        if (aqi <= 200) return { label: "Unhealthy", color: "bg-orange-500", text: "text-orange-600", msg: "Sudden pollution spike detected" };
        return { label: "Hazardous", color: "bg-red-600", text: "text-red-600", msg: "Hazardous: Avoid outdoor activity" };
    }

    async function initRankings() {
        for (let i = 0; i < localities.length; i++) {
            loadingText.innerText = `Collecting data for ${localities[i]}`;
            await new Promise(r => setTimeout(r, 600));
        }

        const data = localities.map(name => {
            let aqi;
            if (name === "Anand Vihar") aqi = Math.floor(Math.random() * 150) + 250;
            else if (name === "Hauz Khas" || name === "Dwarka") aqi = Math.floor(Math.random() * 60) + 50;
            else aqi = Math.floor(Math.random() * 150) + 100;
            return { name, aqi };
        });

        data.sort((a, b) => a.aqi - b.aqi);

        loader.classList.add("hidden");
        content.classList.remove("hidden");

        rankList.innerHTML = data.map((item, index) => {
            const status = getStatus(item.aqi);
            const rankColor = index === 0 ? "text-blue-600 font-bold" : "text-slate-400";

            return `
                <div class="p-6 flex items-center justify-between hover:bg-white/40 transition-colors">
                    <div class="flex items-center gap-4">
                        <span class="w-8 ${rankColor} text-lg">#${index + 1}</span>
                        <div>
                            <h3 class="font-bold text-slate-800">${item.name}</h3>
                            <p class="text-xs ${status.text} font-medium">${status.msg}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl font-black text-slate-800">${item.aqi}</div>
                        <div class="flex items-center justify-end gap-2">
                            <span class="text-[10px] font-bold uppercase text-slate-400">AQI</span>
                            <div class="w-2 h-2 rounded-full ${status.color}"></div>
                            <span class="text-[10px] font-bold uppercase text-slate-600">${status.label}</span>
                        </div>
                    </div>
                </div>
            `;
        }).join("");
    }

    window.onload = initRankings;
</script>

</body>
</html>
